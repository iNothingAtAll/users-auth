name: Lint Code

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.13.12"
      - name: Update and Install
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Check with Ruff
        run: |
          ruff check .
